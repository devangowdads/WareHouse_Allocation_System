spring.application.name=Warehouse_Allocation_System

server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/warehouse_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=wiz@linux

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

logging.file.name=warehouse_allocation-app.log
logging.level.root=debug
logging.level.com.mini_banking=trace

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always